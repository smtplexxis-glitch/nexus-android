name: Build NEXUS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Gradle 8.4
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /opt
        echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

    - name: Build Debug APK (signed with debug key)
      run: gradle assembleDebug
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk

    - name: Rename APK
      run: |
        mkdir -p output
        cp app/build/outputs/apk/debug/app-debug.apk output/NEXUS.apk
        ls -lh output/

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NEXUS-android
        path: output/NEXUS.apk
        retention-days: 30
