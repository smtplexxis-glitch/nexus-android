name: Build NEXUS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Gradle 8.4
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/g.zip
        unzip -q /tmp/g.zip -d /opt
        echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

    - name: Decode keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/nexus.keystore

    - name: Build release APK
      run: gradle assembleRelease
      env:
        ANDROID_HOME:   /usr/local/lib/android/sdk
        KEYSTORE_PATH:  nexus.keystore
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}

    - name: Rename APK
      run: |
        mkdir -p output
        cp app/build/outputs/apk/release/app-release.apk output/NEXUS.apk
        ls -lh output/

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NEXUS-android
        path: output/NEXUS.apk
        retention-days: 30
